<app-box-container3>
  <ng-container boxLabel>{{ "Sign in to your account" | translate }}</ng-container>
  <ng-container boxContent>
    <mtx-alert type="info" *ngIf="showAlert"
               [elevation]="1"
               (closed)="showAlert = false"
               [dismissible]="true">
      <p>username: {{ demoUserName }}</p>
      <p>password: {{ demoPassword }}</p>
    </mtx-alert>
    <form class="space-y-4 md:space-y-6" [formGroup]="loginForm" (submit)="login()">
      <button hidden></button>
      <formly-form [form]="loginForm" [fields]="fields" (submit)="login()">
      </formly-form>
      <div class="py-2" *ngIf="formLevelErrors.length > 0">
        <ng-container *ngFor="let error of formLevelErrors">
          <mat-error>{{ error | translate }}</mat-error>
        </ng-container>
      </div>

    </form>

  </ng-container>
  <ng-container boxAction>
    <button mat-raised-button
            (click)="login()"
            color="primary" style="width: 100%">{{ "Se connecter" | translate }}
    </button>
  </ng-container>
  <ng-container boxLinks>
    <p class="text-sm font-light text-gray-500 dark:text-gray-400">
      {{ "Vous n'avez pas encore de compte ? " | translate }}<a routerLink="/registration"
                                                                class="font-medium text-primary-600 hover:underline dark:text-primary-500">
      {{ "Créez-vous en un" | translate }}</a>
    </p>
  </ng-container>
</app-box-container3>
