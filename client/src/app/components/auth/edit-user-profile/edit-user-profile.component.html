<div class="max-w-2xl">
  <form class="space-y-4 md:space-y-6" [formGroup]="form" (submit)="submit()">
    <formly-form
      [form]="form"
      [model]="userProfile"
      [fields]="formFields">
    </formly-form>
    <button mat-raised-button
            (click)="submit()"
            color="primary">{{ "Enregistrer" | translate }}
    </button>
  </form>
</div>
