<app-dialog-container1>
  <div dialogTitle>
    {{ data.catalog ? 'Modifier le catalogue' : 'Nouveau catalogue' }}
  </div>

  <div dialogContent>
    <form [formGroup]="form" class="dialog-form">
      <formly-form [form]="form" [model]="model" [fields]="fields"></formly-form>
    </form>
    <p *ngIf="errorMessage" class="error-banner">{{ errorMessage }}</p>
  </div>

  <div dialogActions>
    <button mat-stroked-button mat-dialog-close [disabled]="isSubmitting">Annuler</button>
    <button mat-flat-button color="primary" (click)="save()" [disabled]="isSubmitting">
      <mat-spinner *ngIf="isSubmitting" diameter="18"></mat-spinner>
      <span>Enregistrer</span>
    </button>
  </div>
</app-dialog-container1>
