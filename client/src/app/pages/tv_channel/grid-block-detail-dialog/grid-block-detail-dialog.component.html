<app-dialog-container1>
  <div dialogTitle>
    Bloc {{ data.block.starts_at }} - {{ data.block.ends_at }}
  </div>

  <div dialogContent>
    <mat-tab-group>
      <mat-tab label="Bloc">
        <div class="detail-grid">
          <div class="detail-loading" *ngIf="isLoadingAvailableMediaCount">
            <mat-spinner diameter="20"></mat-spinner>
            <span>Chargement du nombre de medias disponibles...</span>
          </div>
          <div class="detail-row" *ngFor="let field of blockFields" [class.is-empty]="field.value === null || field.value === ''">
            <span class="detail-label">{{ field.label }}</span>
            <span class="detail-value">{{ field.value ?? '—' }}</span>
          </div>
        </div>
      </mat-tab>
      <mat-tab label="Ligne edito">
        <div class="detail-grid">
          <div class="detail-row" *ngFor="let field of editorialFields" [class.is-empty]="field.value === null || field.value === ''">
            <span class="detail-label">{{ field.label }}</span>
            <span class="detail-value">{{ field.value ?? '—' }}</span>
          </div>
        </div>
      </mat-tab>
    </mat-tab-group>
  </div>

  <div dialogActions>
    <button mat-stroked-button mat-dialog-close>Fermer</button>
  </div>
</app-dialog-container1>
