<app-dialog-container1>
  <div dialogTitle>
    Ligne edito de {{ data.channelName }}
  </div>

  <div dialogContent>
    <div class="detail-loading" *ngIf="isLoading">
      <mat-spinner diameter="20"></mat-spinner>
      <span>Chargement de la ligne edito...</span>
    </div>

    <div class="detail-grid" *ngIf="!isLoading && editorialLine">
      <div class="detail-row" *ngFor="let field of fields" [class.is-empty]="field.value === null || field.value === ''">
        <span class="detail-label">{{ field.label }}</span>
        <span class="detail-value">{{ field.value ?? '—' }}</span>
      </div>
    </div>
  </div>

  <div dialogActions>
    <button mat-stroked-button mat-dialog-close>Fermer</button>
  </div>
</app-dialog-container1>
