<app-dialog-container1>
  <div dialogTitle>
    Rapports de génération — {{ data.channelName }}
  </div>

  <div dialogContent class="report-list">
    <div *ngIf="isLoading" class="report-loading">
      <mat-spinner diameter="28"></mat-spinner>
    </div>

    <div *ngIf="!isLoading && !reports.length" class="report-empty">
      Aucun rapport pour le playout actif.
    </div>

    <div *ngFor="let report of reports" class="report-card">
      <button type="button" class="report-header" (click)="toggleReport(report)">
        <span class="report-trigger" [ngClass]="'trigger-' + report.trigger">{{ report.trigger }}</span>
        <span class="report-date">{{ report.created_at | date:'dd/MM HH:mm' }}</span>
        <span class="report-counters">
          {{ report.generated_items }} items · {{ report.filled_items }} interludes
          <ng-container *ngIf="report.repaired_gaps"> · {{ report.repaired_gaps }} trous comblés</ng-container>
          <ng-container *ngIf="report.trimmed_overlaps"> · {{ report.trimmed_overlaps }} chevauchements corrigés</ng-container>
        </span>
        <span class="report-issues">
          <span *ngIf="report.issue_counts.error" class="issue-chip severity-error">{{ report.issue_counts.error }}</span>
          <span *ngIf="report.issue_counts.warning" class="issue-chip severity-warning">{{ report.issue_counts.warning }}</span>
          <span *ngIf="report.issue_counts.info" class="issue-chip severity-info">{{ report.issue_counts.info }}</span>
          <span *ngIf="!issuesOf(report).length" class="issue-chip severity-ok">OK</span>
        </span>
      </button>

      <div *ngIf="expandedReportId === report.id && issuesOf(report).length" class="issue-list">
        <div *ngFor="let issue of issuesOf(report)" class="issue-row" [ngClass]="'severity-' + issue.severity">
          <mat-icon class="issue-icon">{{ severityIcon(issue.severity) }}</mat-icon>
          <div class="issue-body">
            <span class="issue-code">{{ issue.code }}</span>
            <span class="issue-message">{{ issue.message }}</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div dialogActions>
    <button mat-stroked-button mat-dialog-close>Fermer</button>
  </div>
</app-dialog-container1>
