<app-dialog-container1>
  <div dialogTitle>{{ title }}</div>

  <div dialogContent>
    <form class="dialog-form">
      <label class="field-label">Collections media</label>
      <div class="collection-list" *ngIf="mediaCollections.length; else noCollections">
        <mat-checkbox
          *ngFor="let collection of mediaCollections"
          [checked]="isSelected(collection)"
          (change)="toggleCollection(collection, $event.checked)"
        >
          {{ collection.name }}
        </mat-checkbox>
      </div>
      <ng-template #noCollections>
        <p class="muted">Aucune collection active disponible.</p>
      </ng-template>

      <label class="field-label" for="target-channel-count">Nombre souhaite de chaines</label>
      <input
        id="target-channel-count"
        name="targetChannelCount"
        type="number"
        min="1"
        [(ngModel)]="targetChannelCount"
      />

      <label class="field-label" for="max-channel-candidates">Maximum de chaines a sauvegarder</label>
      <input
        id="max-channel-candidates"
        name="maxChannelCandidates"
        type="number"
        min="1"
        [(ngModel)]="maxChannelCandidates"
      />

      <mat-checkbox
        class="multi-segment-toggle"
        name="allowMultiSegment"
        [(ngModel)]="allowMultiSegment"
      >
        Autoriser un media dans plusieurs segments
      </mat-checkbox>

      <p class="error-message" *ngIf="errorMessage">{{ errorMessage }}</p>
    </form>
  </div>

  <div dialogActions>
    <button mat-stroked-button mat-dialog-close [disabled]="isSubmitting">Annuler</button>
    <button mat-flat-button color="primary" (click)="save()" [disabled]="isSubmitting">
      <mat-spinner *ngIf="isSubmitting" diameter="18"></mat-spinner>
      <span *ngIf="!isSubmitting">Lancer</span>
    </button>
  </div>
</app-dialog-container1>
