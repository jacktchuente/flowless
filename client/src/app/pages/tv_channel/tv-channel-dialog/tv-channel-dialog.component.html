<app-dialog-container1>
  <div dialogTitle>
    {{ data.channel ? 'Modifier la chaine' : 'Nouvelle chaine' }}
  </div>

  <div dialogContent>
    <form [formGroup]="form" class="dialog-form">
      <formly-form [form]="form" [model]="model" [fields]="fields"></formly-form>
    </form>
    <section class="editorial-panel" *ngIf="editorialFields.length">
      <h3>Ligne edito</h3>
      <div class="editorial-grid">
        <div class="editorial-row" *ngFor="let field of editorialFields" [class.is-empty]="field.value === null || field.value === ''">
          <span class="editorial-label">{{ field.label }}</span>
          <span class="editorial-value">{{ field.value ?? '—' }}</span>
        </div>
      </div>
    </section>
    <section class="name-suggestion-banner" *ngIf="suggestedName">
      <mat-icon>lightbulb</mat-icon>
      <div class="name-suggestion-body">
        <span class="name-suggestion-label">{{ 'TV_CHANNEL_DIALOG.SUGGESTED_NAME' | translate }}</span>
        <strong>{{ suggestedName }}</strong>
      </div>
      <button mat-stroked-button color="primary" type="button" (click)="applySuggestedName()">
        {{ 'TV_CHANNEL_DIALOG.USE_SUGGESTED_NAME' | translate }}
      </button>
      <button mat-icon-button type="button" (click)="dismissSuggestedName()">
        <mat-icon>close</mat-icon>
      </button>
    </section>
    <p *ngIf="errorMessage" class="error-banner">{{ errorMessage }}</p>
  </div>

  <div dialogActions>
    <button mat-stroked-button mat-dialog-close [disabled]="isSubmitting">Annuler</button>
    <button
      mat-stroked-button
      type="button"
      *ngIf="data.channel"
      (click)="suggestName()"
      [disabled]="isSuggestingName || isSubmitting"
    >
      <mat-spinner *ngIf="isSuggestingName" diameter="18"></mat-spinner>
      <mat-icon *ngIf="!isSuggestingName">lightbulb</mat-icon>
      <span>{{ 'TV_CHANNEL_DIALOG.SUGGEST_NAME' | translate }}</span>
    </button>
    <button mat-flat-button color="primary" (click)="save()" [disabled]="isSubmitting">
      <mat-spinner *ngIf="isSubmitting" diameter="18"></mat-spinner>
      <span>Enregistrer</span>
    </button>
  </div>
</app-dialog-container1>
