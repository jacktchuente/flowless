<app-dialog-container1><div dialogTitle>{{ 'MANUAL_EDIT.EDIT_GRID' | translate }}</div><div dialogContent><app-suggestion-panel [disabled]="isSubmitting" [isLoading]="isSuggesting" [error]="error" (suggest)="suggest($event)"></app-suggestion-panel><form [formGroup]="form"><formly-form [form]="form" [model]="model" [fields]="fields"></formly-form></form></div><div dialogActions><button mat-stroked-button mat-dialog-close [disabled]="isSubmitting">{{ 'MANUAL_EDIT.CANCEL' | translate }}</button><button mat-flat-button color="primary" (click)="save()" [disabled]="isSubmitting"><mat-spinner *ngIf="isSubmitting" diameter="18"></mat-spinner>{{ 'MANUAL_EDIT.SAVE' | translate }}</button></div></app-dialog-container1>
