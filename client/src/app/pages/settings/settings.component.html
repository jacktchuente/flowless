<header class="topline">
  <div>
    <span class="eyebrow">{{ "SETTINGS.EYEBROW" | translate }}</span>
    <h1>{{ "SETTINGS.TITLE" | translate }}</h1>
    <p class="sub">{{ "SETTINGS.SUBTITLE" | translate }}</p>
  </div>
</header>
<div class="content">
  <section class="card">
    <div class="panel">
      <div class="panel-head">
        <div>
          <h2>{{ "SETTINGS.LANGUAGE.TITLE" | translate }}</h2>
          <p>{{ "SETTINGS.LANGUAGE.DESC" | translate }}</p>
        </div>
      </div>
      <div class="field language">
        <label>{{ "NAV.LANGUAGE" | translate }}</label
        ><flw-select
          [value]="language"
          [options]="languageOptions"
          (valueChange)="changeLanguage($any($event))"
        />
      </div>
    </div>
  </section>
</div>
