networks:
  traefik_default:
    external: true
  internal:

services:
  gateway:
    image: nginx:1.31.0
    restart: unless-stopped
    depends_on:
      - client
      - api
    labels:
      - traefik.enable=true
      - traefik.http.routers.${PROJECT_NAME}-gateway.entrypoints=websecure
      - traefik.http.routers.${PROJECT_NAME}-gateway.rule=Host(`${DOMAIN_NAME}`)
      - traefik.http.services.${PROJECT_NAME}-gateway.loadbalancer.server.port=80
      - traefik.http.routers.${PROJECT_NAME}-gateway-http.entrypoints=web
      - traefik.http.routers.${PROJECT_NAME}-gateway-http.middlewares=to-https
      - traefik.http.routers.${PROJECT_NAME}-gateway.service=${PROJECT_NAME}-gateway
      - traefik.http.routers.${PROJECT_NAME}-gateway.tls=true
      - traefik.http.routers.${PROJECT_NAME}-gateway.tls.certresolver=letsencrypt
      - traefik.http.middlewares.to-https.redirectscheme.scheme=websecure
      - traefik.docker.network=traefik_default
    networks:
      - traefik_default
      - internal
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro

  client:
    image: flowless/flowless-client
    restart: unless-stopped
    networks:
      - internal
    env_file:
      - .env

  api:
    image: flowless/flowless-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    env_file:
      - .env

  postgres:
    image: postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    volumes:
      - /srv/docker/${PROJECT_NAME}/postgresql:/var/lib/postgresql
    restart: unless-stopped
    networks:
      - internal
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: "redis:latest"
    restart: unless-stopped
    networks:
      - internal
