name: Docker Image CI

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"

jobs:
  build_web_app:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          path: repo

      - name: Install runner dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y git-crypt rsync openssh-client

      - name: Unlock git-crypt on runner
        env:
          RM_DEPLOY_GIT_CRYPT_KEY: ${{ secrets.RM_DEPLOY_GIT_CRYPT_KEY }}
        run: |
          set -euo pipefail

          printf '%s' "$RM_DEPLOY_GIT_CRYPT_KEY" | base64 -d > /tmp/git-crypt-key
          chmod 600 /tmp/git-crypt-key

          cd repo
          git-crypt unlock /tmp/git-crypt-key

          rm -f /tmp/git-crypt-key

      - name: Build Docker images
        working-directory: repo
        run: |
          set -euo pipefail
          docker build -t flowless/flowless-api:latest api/
          docker build -t flowless/flowless-client:latest client/

      - name: Export Docker images
        working-directory: repo
        run: |
          set -euo pipefail
          docker save flowless/flowless-api:latest -o flowless-api.tar
          docker save flowless/flowless-client:latest -o flowless-client.tar

      - name: Prepare SSH
        env:
          LIVE_DEPLOY_SSH_KEY: ${{ secrets.LIVE_DEPLOY_SSH_KEY }}
          LIVE_DEPLOY_KNOWN_HOSTS: ${{ secrets.LIVE_DEPLOY_KNOWN_HOSTS }}
        run: |
          set -euo pipefail

          install -m 700 -d ~/.ssh
          printf '%s\n' "$LIVE_DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          printf '%s\n' "$LIVE_DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Define remote project path
        id: project
        env:
          LIVE_DEPLOY_PATH_WORKSPACE: ${{ secrets.LIVE_DEPLOY_PATH_WORKSPACE }}
        run: |
          set -euo pipefail
          PROJECT_NAME="${{ github.event.repository.name }}"
          echo "project_name=${PROJECT_NAME}" >> "$GITHUB_OUTPUT"
          echo "remote_project_path=${LIVE_DEPLOY_PATH_WORKSPACE}/${PROJECT_NAME}" >> "$GITHUB_OUTPUT"

      - name: Create remote target directory
        env:
          LIVE_DEPLOY_HOST: ${{ secrets.LIVE_DEPLOY_HOST }}
          LIVE_DEPLOY_USER: ${{ secrets.LIVE_DEPLOY_USER }}
          REMOTE_PROJECT_PATH: ${{ steps.project.outputs.remote_project_path }}
        run: |
          set -euo pipefail

          ssh -i ~/.ssh/id_ed25519 "${LIVE_DEPLOY_USER}@${LIVE_DEPLOY_HOST}" \
            "mkdir -p '${REMOTE_PROJECT_PATH}'"

      - name: Sync repository to remote host
        env:
          LIVE_DEPLOY_HOST: ${{ secrets.LIVE_DEPLOY_HOST }}
          LIVE_DEPLOY_USER: ${{ secrets.LIVE_DEPLOY_USER }}
          REMOTE_PROJECT_PATH: ${{ steps.project.outputs.remote_project_path }}
        run: |
          set -euo pipefail

          rsync -az --delete \
            --exclude '.git' \
            --exclude 'flowless-api.tar' \
            --exclude 'flowless-client.tar' \
            -e "ssh -i ~/.ssh/id_ed25519" \
            repo/ "${LIVE_DEPLOY_USER}@${LIVE_DEPLOY_HOST}:${REMOTE_PROJECT_PATH}/"

      - name: Transfer Docker images to remote host
        env:
          LIVE_DEPLOY_HOST: ${{ secrets.LIVE_DEPLOY_HOST }}
          LIVE_DEPLOY_USER: ${{ secrets.LIVE_DEPLOY_USER }}
          REMOTE_PROJECT_PATH: ${{ steps.project.outputs.remote_project_path }}
        run: |
          set -euo pipefail

          scp -i ~/.ssh/id_ed25519 repo/flowless-api.tar \
            "${LIVE_DEPLOY_USER}@${LIVE_DEPLOY_HOST}:${REMOTE_PROJECT_PATH}/flowless-api.tar"
          scp -i ~/.ssh/id_ed25519 repo/flowless-client.tar \
            "${LIVE_DEPLOY_USER}@${LIVE_DEPLOY_HOST}:${REMOTE_PROJECT_PATH}/flowless-client.tar"

      - name: Load Docker images and start compose on remote host
        env:
          LIVE_DEPLOY_HOST: ${{ secrets.LIVE_DEPLOY_HOST }}
          LIVE_DEPLOY_USER: ${{ secrets.LIVE_DEPLOY_USER }}
          REMOTE_PROJECT_PATH: ${{ steps.project.outputs.remote_project_path }}
        run: |
          set -euo pipefail

          ssh -i ~/.ssh/id_ed25519 "${LIVE_DEPLOY_USER}@${LIVE_DEPLOY_HOST}" /bin/bash <<EOF
          set -euo pipefail

          cd "${REMOTE_PROJECT_PATH}"

          docker load -i flowless-api.tar
          docker load -i flowless-client.tar
          rm -f flowless-api.tar
          rm -f flowless-client.tar
          docker compose down --remove-orphans
          docker compose up -d
          docker image prune -f
          EOF

      - name: Wait for healthy API on remote host
        env:
          LIVE_DEPLOY_HOST: ${{ secrets.LIVE_DEPLOY_HOST }}
          LIVE_DEPLOY_USER: ${{ secrets.LIVE_DEPLOY_USER }}
          REMOTE_PROJECT_PATH: ${{ steps.project.outputs.remote_project_path }}
        run: |
          set -euo pipefail

          ssh -i ~/.ssh/id_ed25519 "${LIVE_DEPLOY_USER}@${LIVE_DEPLOY_HOST}" /bin/bash <<EOF
          set -euo pipefail

          cd "${REMOTE_PROJECT_PATH}"

          for attempt in \$(seq 1 30); do
            state=\$(docker inspect -f '{{.State.Health.Status}}' "\$(docker compose ps -q api)" 2>/dev/null || echo unknown)
            if [ "\$state" = "healthy" ]; then
              echo "API healthy after \$attempt check(s)."
              exit 0
            fi
            sleep 10
          done

          echo "API still \$state after 5 minutes" >&2
          docker compose logs --tail=100 api >&2 || true
          exit 1
          EOF

      - name: Clean up build artifacts on runner
        run: |
          set -euo pipefail

          rm -f repo/flowless-api.tar repo/flowless-client.tar
          docker rmi -f flowless/flowless-api:latest flowless/flowless-client:latest
          docker image prune -f

  sonarqube:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: https://gitea.fyrex.top/red/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.GLOBAL_SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
